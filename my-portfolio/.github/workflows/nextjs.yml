name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # On force npm install dans le dossier my-portfolio
        run: npm install
        working-directory: ./my-portfolio

      - name: Build with Next.js
        # On force le build dans le dossier my-portfolio
        run: npx next build
        working-directory: ./my-portfolio

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # On récupère le dossier d'exportation statique
          path: ./my-portfolio/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5